<!doctype html>
<html lang="zh-CN" data-theme="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>{{PAPER_TITLE}} · Paper Atlas</title>
  <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body class="paper-page">
  <div class="site-ambient" aria-hidden="true"><span class="orb orb-a"></span><span class="orb orb-b"></span></div>
  <header class="topbar">
    <a class="brand" href="../../"><span class="brand-mark">∫</span><span><strong>Paper Atlas</strong><small>{{ARXIV_ID}}</small></span></a>
    <nav class="topnav" aria-label="论文页导航">
      <a href="#motivation">动机</a>
      <a href="#method">方法</a>
      <a href="#experiments">实验</a>
      <a href="#results">结果</a>
      <a href="#critique">评价</a>
    </nav>
    <a class="ghost-button" href="../../">回到首页</a>
  </header>

  <main class="paper-article">
    <section class="paper-hero">
      <div class="eyebrow"><span></span> {{CATEGORY}} · {{YEAR}}</div>
      <h1>{{PAPER_TITLE}}</h1>
      <p>{{ONE_SENTENCE_SUMMARY}}</p>
      <div class="paper-tags">{{TAG_CHIPS}}</div>
    </section>

    <section class="content-card" id="motivation"><h2>1. 研究动机</h2>{{MOTIVATION_HTML}}</section>
    <section class="content-card" id="method"><h2>2. 数学表示与方法</h2>{{METHOD_HTML}}</section>
    <section class="content-card" id="experiments"><h2>3. 实验设计与复现细节</h2>{{EXPERIMENTS_HTML}}</section>
    <section class="content-card" id="results"><h2>4. 实验结果与核心结论</h2>{{RESULTS_HTML}}</section>
    <section class="content-card" id="critique"><h2>5. Reviewer Critique</h2>{{CRITIQUE_HTML}}</section>
  </main>
</body>
</html>
